<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoLine — 3D Coordinate Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
        "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #f0f4f8;
      --ink-muted:  #64748b;
      --ink-dim:    #334155;
      --bg:         #060c14;
      --surface:    rgba(8, 18, 30, 0.82);
      --surface-hi: rgba(12, 26, 44, 0.95);
      --border:     rgba(255,255,255,0.07);
      --border-hi:  rgba(99, 228, 207, 0.25);
      --accent:     #63e4cf;
      --accent-glow:rgba(99, 228, 207, 0.18);
      --amber:      #fbbf24;
      --blue:       #60a5fa;
      --r:          12px;
      --r-sm:       8px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #canvas-wrap { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }

    /* ───── GLASSMORPHISM BASE ───── */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    /* ───── LOADING ───── */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      background: var(--bg);
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #loading.fade { opacity: 0; visibility: hidden; }

    .load-wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .load-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1;
      text-wrap: balance;
    }
    .load-title strong { font-weight: 600; color: var(--accent); }

    .load-track {
      width: 160px; height: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px; overflow: hidden;
    }
    .load-bar {
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      width: 0;
      transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ───── LEFT PANEL ───── */
    #panel-left {
      position: fixed;
      top: 20px; left: 20px;
      width: 272px;
      z-index: 10;
      display: flex; flex-direction: column; gap: 2px;
    }

    .panel-block {
      padding: 16px 18px;
    }

    .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 2px;
    }

    .wordmark-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
      flex-shrink: 0;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.75); }
    }

    .wordmark-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    .wordmark-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      padding-left: 15px;
    }

    /* ── MODE TOGGLE ── */
    .toggle-row {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px; gap: 3px;
    }

    .mode-btn {
      flex: 1; padding: 8px 6px;
      border: none; border-radius: 6px;
      background: transparent;
      color: var(--ink-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .mode-btn:hover:not(.active) { color: var(--ink); background: rgba(255,255,255,0.05); }
    .mode-btn.active {
      background: var(--accent);
      color: #060c14;
      box-shadow: 0 0 16px rgba(99, 228, 207, 0.35);
    }

    /* ── DEGREE AREA ── */
    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 8px;
    }

    .degree-big {
      font-family: 'JetBrains Mono', monospace;
      font-size: 36px; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-shadow: 0 0 24px rgba(99, 228, 207, 0.4);
      line-height: 1;
      margin-bottom: 14px;
      transition: color 0.2s;
    }
    .degree-big sup { font-size: 16px; font-weight: 400; opacity: 0.6; vertical-align: super; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px; outline: none;
      cursor: pointer;
      margin-bottom: 10px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(99,228,207,0.7);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 14px rgba(99,228,207,0.9);
    }

    .num-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 12px;
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .num-input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(99,228,207,0.08);
    }
    .num-input::placeholder { color: var(--ink-dim); }

    /* ── SEARCH ── */
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-dim); font-size: 13px;
      pointer-events: none; user-select: none;
    }
    .city-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 12px 9px 30px;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .city-input:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(99,228,207,0.08);
    }
    .city-input::placeholder { color: var(--ink-dim); }

    #dropdown {
      position: fixed; /* Escape any overflow clipping */
      width: 272px;
      background: var(--surface-hi);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-sm);
      max-height: 220px; overflow-y: auto;
      z-index: 200;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #dropdown::-webkit-scrollbar { width: 3px; }
    #dropdown::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .drop-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .drop-item:last-child { border-bottom: none; }
    .drop-item:hover { background: rgba(99,228,207,0.08); }
    .drop-name { font-size: 12px; color: var(--ink); font-weight: 500; }
    .drop-coord { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-muted); }

    /* ───── RIGHT PANEL ───── */
    #panel-right {
      position: fixed;
      top: 20px; right: 20px;
      width: 252px; z-index: 10;
      display: flex; flex-direction: column; gap: 2px;
    }

    /* Active line hero */
    .line-hero {
      text-align: center;
      padding: 20px 18px;
      border-bottom: 1px solid var(--border);
    }
    .line-hero-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-dim); margin-bottom: 8px;
    }
    .line-hero-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(99,228,207,0.5);
      line-height: 1; margin-bottom: 5px;
    }
    .line-hero-name {
      font-size: 11px; font-weight: 400;
      color: var(--ink-muted);
    }

    /* Cities list */
    .cities-header-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .cities-count-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 700;
      background: rgba(99,228,207,0.12);
      color: var(--accent);
      border: 1px solid var(--border-hi);
      padding: 2px 7px; border-radius: 20px;
    }

    #cities-list {
      padding: 0 10px 12px;
      display: flex; flex-direction: column; gap: 4px;
      max-height: 400px; overflow-y: auto;
    }
    #cities-list::-webkit-scrollbar { width: 3px; }
    #cities-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .city-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .city-row:hover {
      background: rgba(99,228,207,0.06);
      border-color: rgba(99,228,207,0.15);
    }
    .city-pip {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0;
    }
    .city-row-info { flex: 1; min-width: 0; }
    .city-row-name {
      font-size: 12px; font-weight: 500;
      color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .city-row-coords {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--ink-muted); margin-top: 1px;
    }
    .city-row-delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--accent); flex-shrink: 0;
    }

    .no-cities {
      padding: 16px 10px;
      font-size: 11px; color: var(--ink-dim);
      text-align: center;
      font-style: italic;
    }

    /* ───── LEGEND ───── */
    #legend {
      position: fixed; bottom: 20px;
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; align-items: center; gap: 20px;
      padding: 10px 20px;
      white-space: nowrap;
    }
    .leg-item { display: flex; align-items: center; gap: 7px; }
    .leg-line { width: 20px; height: 1.5px; border-radius: 1px; }
    .leg-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-dim); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ───── TOOLTIP ───── */
    #tip {
      position: fixed; z-index: 50; pointer-events: none;
      padding: 5px 10px;
      background: var(--surface-hi);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      font-size: 11px; font-weight: 500; color: var(--ink);
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    /* ───── DRAG HINT ───── */
    #drag-hint {
      position: fixed; bottom: 62px;
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      opacity: 1;
      transition: opacity 1.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ───── DIVIDER ───── */
    .divider { height: 1px; background: var(--border); margin: 0; }

    @media (max-width: 700px) {
      #panel-right { display: none; }
      #panel-left { width: 240px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wordmark-dot { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-wordmark">Coordinate Visualizer</div>
  <div class="load-title">Geo<strong>Line</strong></div>
  <div class="load-track"><div class="load-bar" id="load-bar"></div></div>
</div>

<!-- 3D Canvas -->
<div id="canvas-wrap"></div>

<!-- Tooltip -->
<div id="tip"></div>

<!-- LEFT PANEL -->
<div id="panel-left" class="glass">

  <div class="panel-header panel-block">
    <div class="wordmark">
      <div class="wordmark-dot"></div>
      <span class="wordmark-text">GeoLine</span>
    </div>
    <div class="wordmark-sub">3D Coordinate Visualizer</div>
  </div>

  <div class="panel-block" style="padding-bottom: 12px;">
    <div class="label">Coordinate type</div>
    <div class="toggle-row">
      <button class="mode-btn active" id="btn-lat" onclick="setMode('lat')">↔ Latitude</button>
      <button class="mode-btn" id="btn-lon" onclick="setMode('lon')">↕ Longitude</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel-block">
    <div class="label">Degree</div>
    <div class="degree-big" id="deg-display">0.0<sup>°</sup></div>
    <input type="range" id="slider" min="-90" max="90" step="0.1" value="0" />
    <input type="number" id="num-in" class="num-input" min="-90" max="90" step="0.1" value="0" placeholder="Enter degrees…" />
  </div>

  <div class="divider"></div>

  <div class="panel-block" style="padding-bottom: 18px; position: relative;">
    <div class="label">Search city</div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="city-in" class="city-input" placeholder="e.g. Tokyo, London…" autocomplete="off" />
    </div>
    <div id="dropdown"></div>
  </div>

</div>

<!-- RIGHT PANEL -->
<div id="panel-right" class="glass">

  <div class="line-hero">
    <div class="line-hero-label" id="rp-label">Active Parallel</div>
    <div class="line-hero-val" id="rp-val">0.0°</div>
    <div class="line-hero-name" id="rp-name">Equator</div>
  </div>

  <div class="cities-header-row">
    <div class="label" style="margin:0">On this line</div>
    <div class="cities-count-badge" id="city-count">0</div>
  </div>

  <div id="cities-list">
    <div class="no-cities">Adjust the line to find cities</div>
  </div>

</div>

<!-- Legend -->
<div id="legend" class="glass">
  <div class="leg-item">
    <div class="leg-line" style="background:var(--accent); box-shadow:0 0 4px var(--accent);"></div>
    <span class="leg-text">Active line</span>
  </div>
  <div class="leg-item">
    <div class="leg-line" style="background:var(--amber); opacity:.7;"></div>
    <span class="leg-text">Equator</span>
  </div>
  <div class="leg-item">
    <div class="leg-line" style="background:var(--blue); opacity:.5;"></div>
    <span class="leg-text">Prime meridian</span>
  </div>
</div>

<div id="drag-hint">↑ Drag line on globe to move it</div>

<script type="module" src="main.js"></script>
</body>
</html>
